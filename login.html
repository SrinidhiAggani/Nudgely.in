<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Signup - Nudgely</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">

    <div class="auth-wrapper">
        <a href="index.html" class="back-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Back to home
        </a>

        <div class="auth-card reveal">
            <div class="auth-header text-center">
                <h2 id="auth-title">Get started</h2>
                <p id="auth-subtitle">Create your account and discover your path</p>
            </div>
            
            <button class="btn btn-social">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12s4.48 10 10 10c5.14 0 9.4-3.87 9.9-8.91h-9.9"></path></svg>
                Continue with Google
            </button>
            
            <div class="auth-divider">
                <span>or</span>
            </div>

            <form id="auth-form" class="auth-form">
                
                <div id="signup-fields">
                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                            <input type="text" id="fullName" class="form-control" placeholder="Your full name">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="username">Username</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94"></path></svg>
                            <input type="text" id="username" class="form-control" placeholder="Choose a unique username">
                        </div>
                    </div>
                    
                    <div class="form-group full-width">
                        <label for="nickname">Nickname</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                            <input type="text" id="nickname" class="form-control" placeholder="What should we call you?">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label id="identity-label" for="identity">Email or Username</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                        <input type="text" id="identity" class="form-control" placeholder="you@example.com or username" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="button" class="btn btn-primary" style="width: 100%; margin-top: 1rem;" id="submit-btn">Create Account</button>
            </form>
            
            <p class="auth-footer-text text-center" style="margin-top: 1.5rem; color: var(--text-muted); font-size: 0.95rem;">
                <span id="toggle-text">Already have an account?</span> <a href="#" id="toggle-link" class="text-accent" style="font-weight: 600; cursor: pointer;">Sign in</a>
            </p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Trigger reveal animation
            setTimeout(() => {
                document.querySelector('.auth-card').classList.add('active');
            }, 100);

            // Toggle Logic
            let isLoginMode = false;
            const toggleLink = document.getElementById('toggle-link');
            const toggleText = document.getElementById('toggle-text');
            const authTitle = document.getElementById('auth-title');
            const authSubtitle = document.getElementById('auth-subtitle');
            const submitBtn = document.getElementById('submit-btn');
            const signupFields = document.getElementById('signup-fields');
            const identityLabel = document.getElementById('identity-label');
            const identityInput = document.getElementById('identity');
            
            // Required inputs inside signup-fields
            const signupInputs = signupFields.querySelectorAll('input');

            toggleLink.addEventListener('click', (e) => {
                e.preventDefault();
                isLoginMode = !isLoginMode;

                if (isLoginMode) {
                    // Switch to Sign In
                    authTitle.innerText = 'Welcome back';
                    authSubtitle.innerText = 'Sign in to continue your journey';
                    signupFields.style.display = 'none';
                    identityLabel.innerText = 'Email or Username';
                    identityInput.placeholder = 'you@example.com or username';
                    submitBtn.innerText = 'Sign In';
                    toggleText.innerText = "Don't have an account?";
                    toggleLink.innerText = 'Sign up';
                    
                    // Remove required constraint for hidden fields
                    signupInputs.forEach(input => input.removeAttribute('required'));
                } else {
                    // Switch to Sign Up
                    authTitle.innerText = 'Get started';
                    authSubtitle.innerText = 'Create your account and discover your path';
                    signupFields.style.display = 'block';
                    identityLabel.innerText = 'Email'; // Usually just email for signup
                    identityInput.placeholder = 'you@example.com';
                    submitBtn.innerText = 'Create Account';
                    toggleText.innerText = 'Already have an account?';
                    toggleLink.innerText = 'Sign in';

                    // Add required constraint back
                    signupInputs.forEach(input => input.setAttribute('required', 'required'));
                }
            });
            
            // Initialize required state
            signupInputs.forEach(input => input.setAttribute('required', 'required'));

            // Fake Automation: Redirect to Onboarding Questionnaire on button click
            submitBtn.addEventListener('click', (e) => {
                e.preventDefault();
                // Bypass actual authentication and form validation
                window.location.href = 'onboarding.html';
            });
        });
    </script>
</body>
</html>
